  <body>
    <a class="skip-link" href="#conteudo-principal">Pular para conteúdo</a>
    <header class="header">
      <div class="container nav">
        <a class="brand" href="../">IBAGameTools</a>
        <button class="menu-toggle" type="button" aria-label="Abrir menu de navegação" aria-expanded="false">
          <span class="menu-toggle-bar"></span>
          <span class="menu-toggle-bar"></span>
          <span class="menu-toggle-bar"></span>
        </button>
        <nav>
          <a href="../">Home</a>
          <a href="../jogos.html">Jogos</a>
          <a href="../ferramentas.html">Ferramentas</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema claro e escuro">🌙 Modo escuro</button>
      </div>
    </header>

    <main id="conteudo-principal" class="container page-main">
      <section class="section-intro">
        <h1>Jogo da Memória</h1>
        <p>Encontre todos os pares no menor tempo possível e com poucas jogadas.</p>
      </section>

      <section class="section">
        <article class="card game-card">
          <p id="memoria-status" class="result" aria-live="polite" role="status">Tempo: 0s · Jogadas: 0 · Pares: 0/6 · Melhor: --</p>
          <div class="field memory-difficulty">
            <label for="memoria-difficulty">Dificuldade</label>
            <select id="memoria-difficulty">
              <option value="6" selected>Fácil (6 pares)</option>
              <option value="8">Médio (8 pares)</option>
              <option value="10">Difícil (10 pares)</option>
            </select>
          </div>
          <div id="memoria-grid" class="memory-grid grid-6" aria-label="Tabuleiro do jogo da memória"></div>
          <div class="field-row">
            <button id="memoria-reset" class="btn btn-primary">Jogar novamente</button>
            <button id="memoria-share" class="btn btn-secondary">Compartilhar resultado</button>
          </div>
        </article>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-content">

          Explore: <a href="../">Home</a> · <a href="../jogos.html">Jogos</a> ·
